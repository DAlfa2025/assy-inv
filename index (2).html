<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASSY-INV C3 · Control de Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0b0d12;--bg2:#111318;--bg3:#181b22;--bg4:#1e2230;--bg5:#242840;
  --border:#252a38;--border2:#2e3448;
  --accent:#d4f53c;--accent2:#3cf5b4;--red:#f5503c;--orange:#f5a03c;--blue:#3cb4f5;
  --text:#dde1ee;--text2:#7880a0;--text3:#3e4560;
  --font:'Barlow',sans-serif;--mono:'DM Mono',monospace;
  --ok-bg:rgba(60,245,180,.1);--ok-bd:rgba(60,245,180,.3);--ok-tx:#3cf5b4;
  --ns-bg:rgba(245,80,60,.1);--ns-bd:rgba(245,80,60,.3);--ns-tx:#f5503c;
  --na-bg:rgba(62,69,96,.15);--na-bd:rgba(62,69,96,.3);--na-tx:#4a5478;
  --weld-tx:#3cb4f5;--weld-bg:rgba(60,180,245,.1);--weld-bd:rgba(60,180,245,.3);
  --pint-tx:#f5a03c;--pint-bg:rgba(245,160,60,.1);--pint-bd:rgba(245,160,60,.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow:hidden;}

header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.logo{font-family:var(--mono);font-size:12px;letter-spacing:.15em;color:var(--accent);}
.logo em{color:var(--text2);font-style:normal;}
.hright{display:flex;align-items:center;gap:8px;}
.chip{font-family:var(--mono);font-size:10px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:3px 9px;border-radius:3px;letter-spacing:.05em;cursor:default;}
.chip.clickable{cursor:pointer;transition:all .15s;}
.chip.clickable:hover{border-color:var(--accent2);color:var(--accent2);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);display:inline-block;margin-right:4px;transition:background .3s;}
.sync-dot.ok{background:var(--ok-tx);}
.sync-dot.err{background:var(--ns-tx);}
.sync-dot.loading{background:var(--orange);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.app{display:grid;grid-template-columns:310px 1fr;height:calc(100vh - 52px);}

aside{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.side-scroll{flex:1;overflow-y:auto;}
.block-hd{padding:11px 16px 9px;font-size:9px;font-weight:700;letter-spacing:.25em;color:var(--text2);border-bottom:1px solid var(--border);text-transform:uppercase;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.pip{width:5px;height:5px;border-radius:50%;}
.pip-y{background:var(--accent);}
.pip-g{background:var(--accent2);}
.pip-b{background:var(--blue);}
.pip-o{background:var(--orange);}

.date-bar{padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.date-input{background:var(--bg4);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 9px;flex:1;cursor:pointer;}
.date-input:focus{outline:none;border-color:var(--accent);}
.date-input::-webkit-calendar-picker-indicator{filter:invert(.4);}
.btn-icon{padding:5px 9px;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--mono);font-size:10px;}
.btn-icon:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-icon.danger:hover{border-color:var(--red);color:var(--red);}
.btn-icon:disabled{opacity:.4;cursor:not-allowed;}

.inv-mode-bar{padding:8px 14px;display:flex;gap:6px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mode-btn{flex:1;padding:5px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s;}
.mode-btn.active-weld{border-color:var(--weld-bd);color:var(--weld-tx);background:var(--weld-bg);}
.mode-btn.active-pint{border-color:var(--pint-bd);color:var(--pint-tx);background:var(--pint-bg);}
.mode-btn.active-both{border-color:var(--ok-bd);color:var(--ok-tx);background:var(--ok-bg);}



/* ─── UNIFIED CELL CARD (H + Q + Z) ─── */
.cells-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px;}
.cell-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;overflow:hidden;transition:border-color .15s;}
.cell-card:focus-within{border-color:var(--accent);}
.cell-img-wrap{width:100%;height:64px;background:var(--bg4);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;}
.cell-img-wrap img{width:100%;height:100%;object-fit:cover;}
.cell-img-placeholder{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:9px;text-align:center;padding:4px;}
.cell-img-placeholder .ico{font-size:16px;opacity:.35;}
.cell-img-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.cell-img-wrap:hover{background:rgba(60,245,180,.05);}
.cell-body{padding:6px 8px;}
.cell-key{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--accent);}
.cell-desc{font-size:9px;color:var(--text2);margin-top:1px;line-height:1.3;}
.cell-inputs{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px;}
.cell-field{display:flex;flex-direction:column;gap:2px;}
.cell-field label{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;}
.cell-field input{width:100%;text-align:center;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:12px;padding:3px 2px;transition:border-color .15s;}
.cell-field input:focus{outline:none;}
.cell-field.weld input:focus{border-color:var(--weld-tx);}
.cell-field.pint input:focus{border-color:var(--pint-tx);}

.bottom-area{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
.upload-zone{border:1.5px dashed var(--border2);border-radius:7px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);position:relative;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent2);background:rgba(60,245,180,.04);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.up-title{font-size:11px;font-weight:600;color:var(--text);}
.up-sub{font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:2px;}
.up-info{font-family:var(--mono);font-size:10px;color:var(--accent2);background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:5px 9px;display:none;align-items:center;gap:5px;}
.up-info.show{display:flex;}
.col-pick-wrap{display:none;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;max-height:90px;overflow-y:auto;}
.col-pick-row label{display:flex;align-items:flex-start;gap:6px;font-family:var(--mono);font-size:9px;color:var(--text2);cursor:pointer;padding:2px 0;}
.col-pick-row input{accent-color:var(--accent);margin-top:2px;flex-shrink:0;}
.btn-run{width:100%;padding:11px;background:var(--accent);color:#0b0d12;border:none;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:.15em;cursor:pointer;text-transform:uppercase;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-run:hover{background:#fff;transform:translateY(-1px);}
.btn-run:active{transform:translateY(0);}
.btn-run:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed;transform:none;}

main{display:flex;flex-direction:column;overflow:hidden;}
.res-bar{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0;min-height:56px;}
.stats{display:flex;gap:16px;}
.stat{text-align:center;}
.stat-n{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1;}
.stat-l{font-size:8px;letter-spacing:.2em;color:var(--text2);text-transform:uppercase;margin-top:3px;}
.stat.ok .stat-n{color:var(--ok-tx);}.stat.ns .stat-n{color:var(--ns-tx);}.stat.na .stat-n{color:var(--text3);}.stat.tot .stat-n{color:var(--text2);}
.res-actions{display:flex;gap:6px;}
.btn-sm{padding:6px 12px;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:4px;font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.save-cloud{border-color:var(--accent2);color:var(--accent2);}
.btn-sm.save-cloud:hover{background:var(--ok-bg);}

.filter-bar{padding:7px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg2);flex-shrink:0;}
.filter-chip{font-family:var(--mono);font-size:10px;padding:4px 11px;border-radius:3px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;background:transparent;}
.filter-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(212,245,60,.08);}
.filter-chip.active.ok{border-color:var(--ok-tx);color:var(--ok-tx);background:var(--ok-bg);}
.filter-chip.active.ns{border-color:var(--ns-tx);color:var(--ns-tx);background:var(--ns-bg);}
.filter-chip.active.weld{border-color:var(--weld-tx);color:var(--weld-tx);background:var(--weld-bg);}
.filter-chip.active.pint{border-color:var(--pint-tx);color:var(--pint-tx);background:var(--pint-bg);}
.srch{margin-left:auto;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 9px;width:150px;}
.srch:focus{outline:none;border-color:var(--accent2);}
.srch::placeholder{color:var(--text3);}

.tbl-wrap{flex:1;overflow:auto;}
table{width:max-content;min-width:100%;border-collapse:collapse;}
thead th{position:sticky;top:0;background:var(--bg2);z-index:2;padding:7px 7px;white-space:nowrap;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.08em;color:var(--text2);text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border2);}
thead th.grp{font-size:8px;letter-spacing:.2em;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg2);padding:5px 7px;}
thead th.s0{position:sticky;left:0;z-index:3;min-width:44px;text-align:center;}
thead th.s1{position:sticky;left:44px;z-index:3;min-width:185px;text-align:left;border-right:2px solid var(--border2);}
tbody tr{border-bottom:1px solid var(--border);transition:background .08s;}
tbody tr:hover{background:var(--bg3);}
tbody tr.hidden-row{display:none;}
tbody td{padding:6px 7px;white-space:nowrap;font-family:var(--mono);font-size:10px;border-right:1px solid var(--border);text-align:center;}
tbody td.s0{position:sticky;left:0;background:var(--bg2);z-index:1;color:var(--text3);font-size:9px;}
tbody td.s1{position:sticky;left:44px;background:var(--bg2);z-index:1;text-align:left;color:var(--text);font-size:11px;border-right:2px solid var(--border2);}
tbody tr:hover td.s0,tbody tr:hover td.s1{background:var(--bg3);}
.seq-unk{color:var(--orange);}

.b{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:500;border:1px solid;}
.b-ok{background:var(--ok-bg);color:var(--ok-tx);border-color:var(--ok-bd);}
.b-ns{background:var(--ns-bg);color:var(--ns-tx);border-color:var(--ns-bd);}
.b-na{background:var(--na-bg);color:var(--na-tx);border-color:var(--na-bd);font-size:8px;}

/* HISTORY PANEL */
.hist-panel{position:fixed;right:0;top:52px;bottom:0;width:320px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s;z-index:10;}
.hist-panel.open{transform:translateX(0);}
.hist-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.hist-title{font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--text2);text-transform:uppercase;}
.hist-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;line-height:1;}
.hist-scroll{flex:1;overflow-y:auto;padding:8px;}
.hist-entry{background:var(--bg3);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.hist-entry:hover{border-color:var(--accent2);}
.hist-entry.active-entry{border-color:var(--accent);}
.hist-entry-hd{padding:8px 10px;display:flex;align-items:center;justify-content:space-between;}
.hist-date{font-family:var(--mono);font-size:11px;color:var(--text);font-weight:500;}
.hist-meta{font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:2px;}
.hist-del{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:2px 5px;transition:color .15s;}
.hist-del:hover{color:var(--red);}
.hist-empty{text-align:center;color:var(--text3);font-size:11px;padding:24px 10px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:20;display:none;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:420px;max-width:94vw;}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:13px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;line-height:1;}
.modal-body{padding:16px 18px;font-size:13px;color:var(--text2);line-height:1.6;}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.btn-modal{padding:7px 18px;border-radius:5px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-cancel:hover{border-color:var(--text2);}
.btn-confirm{background:var(--red);border:1px solid var(--red);color:#fff;}
.btn-confirm:hover{background:#ff3020;}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:8px 18px;border-radius:5px;z-index:50;opacity:0;transition:opacity .3s;pointer-events:none;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="logo">ASSY<em>·</em>INV <em>/ C3 CONTROL</em></div>
  <div class="hright">
    <div class="chip" id="syncStatus"><span class="sync-dot" id="syncDot"></span><span id="syncText">conectando...</span></div>
    <div class="chip clickable" onclick="toggleHist()">📋 HISTORIAL</div>
    <div class="chip" id="dateChip"></div>
  </div>
</header>

<div class="app">
<aside>
  <div class="date-bar">
    <input type="date" class="date-input" id="invDate">
    <button class="btn-icon" id="btnSave" onclick="saveSnapshot()" title="Guardar en Supabase">💾 GUARDAR</button>
    <button class="btn-icon danger" onclick="confirmClear()">✕</button>
  </div>
  <div class="inv-mode-bar">
    <button class="mode-btn active-weld" id="modeWeld" onclick="setMode('weld')">⚙ WELDING</button>
    <button class="mode-btn" id="modePint" onclick="setMode('pint')">🎨 PINTURA</button>
    <button class="mode-btn" id="modeBoth" onclick="setMode('both')">≡ AMBOS</button>
  </div>
  <div class="side-scroll">
    <div class="block-hd"><span class="pip pip-o"></span>CELDAS H · FRAMES</div>
    <div class="cells-grid" id="hcellsGrid"></div>
    <div class="block-hd" style="border-top:1px solid var(--border)"><span class="pip pip-b"></span>CELDAS Q · SUB-ENSAMBLES</div>
    <div class="cells-grid" id="qSection"></div>
    <div class="block-hd" style="border-top:1px solid var(--border)"><span class="pip pip-g"></span>CELDAS Z · ROPS</div>
    <div class="cells-grid" id="zSection"></div>
  </div>
  <div class="bottom-area">
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" onchange="handleFile(this.files[0])">
      <div class="up-title">📂 Arrastra o selecciona archivo</div>
      <div class="up-sub">.CSV · .XLSX · .XLS</div>
    </div>
    <div class="up-info" id="upInfo"><span>✓</span><span id="upInfoText"></span></div>
    <div class="col-pick-wrap" id="colPickWrap"><div id="colPickList"></div></div>
    <button class="btn-run" id="btnRun" onclick="procesarSecuencias()" disabled>▶ PROCESAR</button>
  </div>
</aside>

<main id="mainArea">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text2);">
    <div style="font-size:42px;opacity:.2;">⬡</div>
    <div style="font-size:15px;font-weight:700;color:var(--text);">Sin datos</div>
    <div style="font-size:11px;text-align:center;max-width:240px;line-height:1.7;">Carga un archivo de secuencias, configura el inventario y presiona <strong>PROCESAR</strong></div>
  </div>
</main>
</div>

<div class="hist-panel" id="histPanel">
  <div class="hist-header">
    <span class="hist-title">📋 Historial · Supabase</span>
    <button class="hist-close" onclick="toggleHist()">×</button>
  </div>
  <div class="hist-scroll" id="histScroll"><div class="hist-empty">Cargando...</div></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="modalTitle">Confirmar</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn-modal btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal btn-confirm" id="modalConfirmBtn">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════
const SUPA_URL = 'https://smmtsngvtkaxxpahohqx.supabase.co';
const SUPA_KEY = 'sb_publishable_qlMBSMT7CInJLxhMi3CkGw_vzHQ6dwF';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

// ═══════════════════════════════════════════════
// LISTS (VBA-extracted)
// ═══════════════════════════════════════════════
const L={
  AT820:["AT820A-B2M1 BK1","AT820A-B2M5 BK1","AT820B-A2M3 GN1","AT820B-A2M3 RD1","AT820B-A3M1 GN1","AT820B-A3M1 RD1","AT820B-B2M1 GN1","AT820B-B2M1 RD1","AT820B-B2M5 GN1","AT820B-B2M5 RD1","AT820G-A2M1 WT1"],
  AF820:["AF820E-B2M1 BK1","AF820E-B2M5 BK1","AF820F-A2M3 GN1","AF820F-A2M3 RD1","AF820F-B2M1 GN1","AF820F-B2M1 RD1","AF820F-B2M5 GN1","AF820F-B2M5 RD1"],
  DFT00:["DFT00A-A2M3 BK1","DFT00A-A2M3 GN1","DFT00A-B2M1 BK1","DFT00A-B2M1 GN1","DFT00A-B3M1 BK1","DFT00A-B3M1 GN1","DFT00A-B4M1 GN1"],
  DTT00:["DTT00B-A2M3 BK1","DTT00B-B2M1 BK1","DTT00B-B4M1 BK1","DTT00C-B2M2 WT1"],

async function initSupabase(){

}

// ═══════════════════════════════════════════════
// BUILD UI — unified card for all cell types
// ═══════════════════════════════════════════════
function buildCells(cells, containerId){
  const grid=document.getElementById(containerId);
  if(!grid) return;
  grid.innerHTML='';
  cells.forEach(c=>{
    const imgSrc=hCellImages[c.k]||'';
    const card=document.createElement('div');
    card.className='cell-card';
    card.id='card_'+c.k;
    card.innerHTML=`
      <div class="cell-img-wrap" id="cimg_${c.k}">
        <input type="file" accept="image/*" onchange="handleCellImage(event,'${c.k}')">
        ${imgSrc
          ?`<img id="cellimg_${c.k}" src="${imgSrc}">`
          :`<div class="cell-img-placeholder"><div class="ico">📷</div><div style="font-family:var(--mono)">${c.k}</div></div>`}
      </div>
      <div class="cell-body">
        <div class="cell-key">${c.k}</div>
        <div class="cell-desc">${c.desc}</div>
        <div class="cell-inputs">
          <div class="cell-field weld"><label class="lbl-weld" style="color:var(--weld-tx)">⚙ WELD</label><input id="inv_${c.k}_weld" type="number" min="0" value="0"></div>
          <div class="cell-field pint"><label class="lbl-pint" style="color:var(--pint-tx)">🎨 PINT</label><input id="inv_${c.k}_pint" type="number" min="0" value="0"></div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  applyModeVisibility();
}

function buildHCells(){ buildCells(H_CELLS,'hcellsGrid'); }
function buildQZCells(cells,id){ buildCells(cells,id); }

function applyModeVisibility(){
  document.querySelectorAll('[id$="_weld"]').forEach(el=>{el.style.display=invMode==='pint'?'none':'';});
  document.querySelectorAll('[id$="_pint"]').forEach(el=>{el.style.display=invMode==='weld'?'none':'';});

  document.querySelectorAll('.lbl-pint').forEach(el=>{el.style.display=invMode==='weld'?'none':'';});
}

// ═══════════════════════════════════════════════
// IMAGES — SUPABASE STORAGE
// ═══════════════════════════════════════════════
async function handleCellImage(event,cellKey){
  const file=event.target.files[0];
  if(!file) return;
  showToast('⏫ Subiendo imagen...');
  setSyncStatus('loading','subiendo...');
  try {
    const ext=file.name.split('.').pop();
    const path=`hcells/${cellKey}.${ext}`;
    const {error:upErr}=await db.storage.from('cell-images').upload(path,file,{upsert:true});
    if(upErr) throw upErr;
    const {data}=db.storage.from('cell-images').getPublicUrl(path);
    const url=data.publicUrl+'?t='+Date.now();
    await db.from('cell_images').upsert({cell_key:cellKey,image_url:url},{onConflict:'cell_key'});
    hCellImages[cellKey]=url;
    const wrap=document.getElementById('cimg_'+cellKey);
    const inp=wrap.querySelector('input[type=file]');
    wrap.innerHTML='';
    wrap.appendChild(inp);
    const img=document.createElement('img');
    img.src=url; img.id='cellimg_'+cellKey;
    wrap.appendChild(img);
    setSyncStatus('ok','supabase ok');
    showToast('✓ Imagen guardada · '+cellKey);
  } catch(e){
    setSyncStatus('err','error');
    showToast('⚠ Error al subir imagen: '+e.message);
  }
}

async function loadImages(){
  try {
    const {data,error}=await db.from('cell_images').select('cell_key,image_url');
    if(error) throw error;
    (data||[]).forEach(row=>{
      hCellImages[row.cell_key]=row.image_url;
    });
    buildHCells();
  } catch(e){
    console.warn('No se pudieron cargar imágenes:',e.message);
  }
}

function getAllCells(){return [...H_CELLS,...Q_CELLS,...Z_CELLS];}

function readCurrentInv(){
  const weld={},pint={};
  getAllCells().forEach(c=>{
    weld[c.k]=parseInt(document.getElementById('inv_'+c.k+'_weld')?.value)||0;
    pint[c.k]=parseInt(document.getElementById('inv_'+c.k+'_pint')?.value)||0;
  });
  return{weld,pint};
}

async function saveSnapshot(){
  const date=document.getElementById('invDate').value;
  if(!date){showToast('⚠ Selecciona una fecha');return;}
  const btn=document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='💾 Guardando...';
  setSyncStatus('loading','guardando...');
  try {
    const {weld,pint}=readCurrentInv();
    const {error}=await db.from('inventory_snapshots')
      .upsert({date,weld,pint,updated_at:new Date().toISOString()},{onConflict:'date'});
    if(error) throw error;
    setSyncStatus('ok','supabase ok');
    showToast('✓ Inventario guardado · '+date);
    loadHistory();
  } catch(e){
    setSyncStatus('err','error');
    showToast('⚠ Error al guardar: '+e.message);
  } finally{
    btn.disabled=false; btn.textContent='💾 GUARDAR';
  }
}

async function loadSnapshot(date){
  setSyncStatus('loading','cargando...');
  try {
    const {data,error}=await db.from('inventory_snapshots').select('weld,pint').eq('date',date).single();
    if(error) throw error;
    getAllCells().forEach(c=>{
      const w=document.getElementById('inv_'+c.k+'_weld');
      const p=document.getElementById('inv_'+c.k+'_pint');
      if(w) w.value=data.weld?.[c.k]??0;
      if(p) p.value=data.pint?.[c.k]??0;
    });
    document.getElementById('invDate').value=date;
    setSyncStatus('ok','supabase ok');
    showToast('📅 Cargado: '+date);
    document.querySelectorAll('.hist-entry').forEach(e=>e.classList.remove('active-entry'));
    document.querySelector(`.hist-entry[data-date="${date}"]`)?.classList.add('active-entry');
  } catch(e){
    setSyncStatus('err','error');
    showToast('⚠ Error al cargar: '+e.message);
  }
}

async function deleteSnapshot(date){
  try {
    const {error}=await db.from('inventory_snapshots').delete().eq('date',date);
    if(error) throw error;
    showToast('🗑 Eliminado: '+date);
    loadHistory();
  } catch(e){
    showToast('⚠ Error: '+e.message);
  }
}

async function loadHistory(){
  const scroll=document.getElementById('histScroll');
  try {
    const {data,error}=await db.from('inventory_snapshots')
      .select('date,weld,pint').order('date',{ascending:false}).limit(60);
    if(error) throw error;
    if(!data||!data.length){scroll.innerHTML='<div class="hist-empty">Sin registros guardados</div>';return;}
    scroll.innerHTML=data.map(row=>{
      const wTotal=Object.values(row.weld||{}).reduce((s,v)=>s+v,0);
      const pTotal=Object.values(row.pint||{}).reduce((s,v)=>s+v,0);
      const fmt=new Date(row.date+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
      return `<div class="hist-entry" data-date="${row.date}" onclick="loadSnapshot('${row.date}')">
        <div class="hist-entry-hd">
          <div>
            <div class="hist-date">${fmt}</div>
            <div class="hist-meta"><span style="color:var(--weld-tx)">⚙ ${wTotal}</span> &nbsp; <span style="color:var(--pint-tx)">🎨 ${pTotal}</span></div>
          </div>
          <button class="hist-del" onclick="event.stopPropagation();confirmDeleteSnap('${row.date}')" title="Eliminar">✕</button>
        </div>
      </div>`;
    }).join('');
  } catch(e){
    scroll.innerHTML='<div class="hist-empty">Error cargando historial</div>';
  }
}

// ═══════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════
function setupDrop(){
  const dz=document.getElementById('dropZone');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
}

function handleFile(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  if(ext==='csv'){reader.onload=e=>parseCSV(e.target.result,file.name);reader.readAsText(file,'UTF-8');}
  else{reader.onload=e=>parseXLSX(e.target.result,file.name);reader.readAsArrayBuffer(file);}
}

function parseCSV(text,fname){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const delim=lines[0].includes(';')?';':',';
  const rows=lines.map(l=>l.split(delim).map(c=>c.replace(/^["']|["']$/g,'').trim()));
  if(rows[0].length===1){loadedSequences=rows.map(r=>r[0]).filter(Boolean);showFileInfo(fname);return;}
  showColPicker(rows,fname);
}

function parseXLSX(buffer,fname){
  const wb=XLSX.read(buffer,{type:'arraybuffer'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(rows[0].length===1){loadedSequences=rows.map(r=>String(r[0]||'').trim()).filter(Boolean);showFileInfo(fname);return;}
  showColPicker(rows,fname);
}

function showColPicker(rows,fname){
  const wrap=document.getElementById('colPickWrap');
  const list=document.getElementById('colPickList');
  wrap.style.display='block';list.innerHTML='';
  rows[0].forEach((h,i)=>{
    const sample=rows.slice(1,4).map(r=>r[i]||'').filter(Boolean).join(', ');
    const row=document.createElement('div');
    row.className='col-pick-row';
    row.innerHTML=`<label><input type="radio" name="cpick" value="${i}" ${i===1?'checked':''}><span><b style="color:var(--text)">${h||'Col '+(i+1)}</b> <span style="color:var(--text2)">· ${sample.slice(0,40)}</span></span></label>`;
    row.querySelector('input').addEventListener('change',()=>{
      loadedSequences=rows.slice(1).map(r=>String(r[i]||'').trim()).filter(Boolean);
      showFileInfo(fname);
    });
    list.appendChild(row);
  });
  const def=rows[0].findIndex(h=>/sec/i.test(String(h)));
  list.querySelectorAll('input')[def>=0?def:1]?.click();
}

function showFileInfo(fname){
  document.getElementById('upInfoText').textContent=`${fname} · ${loadedSequences.length} secuencias`;
  document.getElementById('upInfo').classList.add('show');
  document.getElementById('btnRun').disabled=loadedSequences.length===0;
}

// ═══════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════
const norm=s=>String(s).trim().replace(/\s+/g,' ').toUpperCase();
function inList(seq,k){if(!k||!L[k])return true;return L[k].includes(norm(seq));}
function getInvTotal(k){
  const w=parseInt(document.getElementById('inv_'+k+'_weld')?.value)||0;
  const p=parseInt(document.getElementById('inv_'+k+'_pint')?.value)||0;
  return w+p;
}
function getInvByType(k,type){
  return parseInt(document.getElementById('inv_'+k+'_'+type)?.value)||0;
}

function procesarSecuencias(){
  if(!loadedSequences.length)return;
  const seqs=loadedSequences.map(norm);
  // Build inventory: separate weld and pint copies
  const invW={},invP={};
  getAllCells().forEach(c=>{
    invW[c.k]=getInvByType(c.k,'weld');
    invP[c.k]=getInvByType(c.k,'pint');
  });
  const results=seqs.map((seq,idx)=>{
    const row={idx:idx+1,seq,raw:loadedSequences[idx],vals:{},source:{}};
    COLS.forEach(col=>{
      const r=evalColSplit(col,seq,invW,invP);
      row.vals[col.id]=r.result;
      row.source[col.id]=r.source; // 'weld'|'pint'|null
    });
    return row;
  });
  lastResults=results;
  colFilter='both';
  renderResults(results);
}

function evalColSplit(col,seq,invW,invP){
  const tryConsumeSplit=(cell)=>{
    if((invW[cell]||0)>=1){invW[cell]--;return{result:'OK',source:'weld'};}
    if((invP[cell]||0)>=1){invP[cell]--;return{result:'OK',source:'pint'};}
    return{result:'SIN STOCK',source:null};
  };
  if(col.multiLista){
    for(let i=0;i<col.listas.length;i++){
      if(inList(seq,col.listas[i])){return tryConsumeSplit(col.cells[i]);}
    }
    return{result:'NO APLICA',source:null};
  }
  if(col.dobleLista){
    for(let i=0;i<col.listas.length;i++){
      if(inList(seq,col.listas[i])){return tryConsumeSplit(col.cells[i]);}
    }
    return{result:'NO APLICA',source:null};
  }
  if(col.excepciones&&col.excepciones.includes(norm(seq)))return{result:'NO APLICA',source:null};
  if(!inList(seq,col.listas[0]))return{result:'NO APLICA',source:null};
  for(const cell of col.cells){
    const r=tryConsumeSplit(cell);
    if(r.result==='OK')return r;
  }
  return{result:'SIN STOCK',source:null};
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function badgeHTML(v,src){
  if(v==='OK'){
    const cls=src==='weld'?'style="border-color:var(--weld-bd);color:var(--weld-tx);background:var(--weld-bg)"':src==='pint'?'style="border-color:var(--pint-bd);color:var(--pint-tx);background:var(--pint-bg)"':'';
    const lbl=src==='weld'?'OK⚙':src==='pint'?'OK🎨':'OK';
    return `<span class="b b-ok" ${cls}>${lbl}</span>`;
  }
  if(v==='SIN STOCK')return`<span class="b b-ns">SIN STOCK</span>`;
  if(v==='NO APLICA')return`<span class="b b-na">N/A</span>`;
  return`<span class="b" style="color:var(--text3)">?</span>`;
}

function renderResults(rows){
  const main=document.getElementById('mainArea');
  let nOK=0,nNS=0,nNA=0,nOKW=0,nOKP=0;
  rows.forEach(r=>Object.entries(r.vals).forEach(([id,v])=>{
    if(v==='OK'){nOK++;if(r.source[id]==='weld')nOKW++;else nOKP++;}
    else if(v==='SIN STOCK')nNS++;
    else nNA++;
  }));

  const groups={};
  COLS.forEach(c=>{if(!groups[c.grp])groups[c.grp]=[];groups[c.grp].push(c);});
  let thGrp='',thCol='';
  Object.entries(groups).forEach(([grp,cols])=>{
    thGrp+=`<th class="grp" colspan="${cols.length}">${grp}</th>`;
    cols.forEach(c=>{thCol+=`<th title="${c.sub} · ${c.cells.join('/')}">${c.id}<br><span style="font-size:8px;color:var(--text3)">${c.name}</span></th>`;});
  });

  let tbody='';
  rows.forEach(r=>{
    const unk=!TODAS_CONOCIDAS.has(r.seq);
    tbody+=`<tr data-row="${r.idx}">
      <td class="s0">${r.idx}</td>
      <td class="s1 ${unk?'seq-unk':''}">${r.raw}${unk?'<span style="color:var(--orange);margin-left:3px" title="No reconocida">⚠</span>':''}</td>`;
    COLS.forEach(c=>{tbody+=`<td>${badgeHTML(r.vals[c.id],r.source[c.id])}</td>`;});
    tbody+='</tr>';
  });

  main.innerHTML=`
    <div class="res-bar">
      <div class="stats">
        <div class="stat ok"><div class="stat-n">${nOK}</div><div class="stat-l">OK Total</div></div>
        <div class="stat" style=""><div class="stat-n" style="color:var(--weld-tx)">${nOKW}</div><div class="stat-l">OK Weld</div></div>
        <div class="stat"><div class="stat-n" style="color:var(--pint-tx)">${nOKP}</div><div class="stat-l">OK Pint</div></div>
        <div class="stat ns"><div class="stat-n">${nNS}</div><div class="stat-l">Sin Stock</div></div>
        <div class="stat na"><div class="stat-n">${nNA}</div><div class="stat-l">N/A</div></div>
        <div class="stat tot"><div class="stat-n">${rows.length}</div><div class="stat-l">Seqs</div></div>
      </div>
      <div class="res-actions">
        <button class="btn-sm save-cloud" onclick="saveResultsCloud()">☁ GUARDAR RESULTADOS</button>
        <button class="btn-sm" onclick="exportCSV()">↓ CSV</button>
        <button class="btn-sm" onclick="exportXLSX()">↓ XLSX</button>
      </div>
    </div>
    <div class="filter-bar">
      <span style="font-family:var(--mono);font-size:9px;color:var(--text2)">FILA:</span>
      <button class="filter-chip active" id="fc-all" onclick="setFilter('all')">TODAS</button>
      <button class="filter-chip ok" id="fc-ok" onclick="setFilter('ok')">CON OK</button>
      <button class="filter-chip ns" id="fc-ns" onclick="setFilter('ns')">SIN STOCK</button>
      <span style="font-family:var(--mono);font-size:9px;color:var(--text2);margin-left:6px">TIPO:</span>
      <button class="filter-chip" id="fc-weld" onclick="setColFilter('weld')">⚙ WELD</button>
      <button class="filter-chip" id="fc-pint" onclick="setColFilter('pint')">🎨 PINT</button>
      <input class="srch" placeholder="Buscar secuencia..." oninput="filterSearch(this.value)">
    </div>
    <div class="tbl-wrap">
      <table id="resTable">
        <thead>
          <tr><th class="s0 grp" rowspan="2">#</th><th class="s1 grp" rowspan="2">SECUENCIA</th>${thGrp}</tr>
          <tr>${thCol}</tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
  activeFilter='all';colFilter='both';
}

function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.filter-chip').forEach(el=>{if(['fc-all','fc-ok','fc-ns'].includes(el.id))el.classList.remove('active');});
  document.getElementById('fc-'+f)?.classList.add('active');
  applyRowFilter();
}

function setColFilter(f){
  colFilter=colFilter===f?'both':f;
  document.getElementById('fc-weld').classList.toggle('active',colFilter==='weld');
  document.getElementById('fc-weld').classList.toggle('weld',colFilter==='weld');
  document.getElementById('fc-pint').classList.toggle('active',colFilter==='pint');
  document.getElementById('fc-pint').classList.toggle('pint',colFilter==='pint');
  applyRowFilter();
}

function applyRowFilter(){
  const q=(document.querySelector('.srch')?.value||'').trim().toUpperCase();
  document.querySelectorAll('#resTable tbody tr').forEach((tr,i)=>{
    const row=lastResults[i];if(!row)return;
    const vals=Object.values(row.vals);
    const srcs=Object.values(row.source);
    let fRow=activeFilter==='all'?true:activeFilter==='ok'?vals.includes('OK'):vals.includes('SIN STOCK');
    if(colFilter!=='both'){
      const hasType=vals.some((v,idx)=>v==='OK'&&srcs[idx]===colFilter);
      fRow=fRow&&hasType;
    }
    const fSearch=!q||row.seq.includes(q);
    tr.classList.toggle('hidden-row',!(fRow&&fSearch));
  });
}

function filterSearch(q){applyRowFilter();}

// ═══════════════════════════════════════════════
// SAVE RESULTS TO CLOUD
// ═══════════════════════════════════════════════
async function saveResultsCloud(){
  if(!lastResults.length)return;
  const date=document.getElementById('invDate').value||todayStr();
  setSyncStatus('loading','guardando resultados...');
  try {
    const {error}=await db.from('processing_results').upsert({
      date,
      sequences:lastResults.map(r=>r.raw),
      results:lastResults.map(r=>({vals:r.vals,source:r.source})),
      created_at:new Date().toISOString()
    },{onConflict:'date'});
    if(error)throw error;
    setSyncStatus('ok','supabase ok');
    showToast('☁ Resultados guardados · '+date);
  }catch(e){
    setSyncStatus('err','error');
    showToast('⚠ Error: '+e.message);
  }
}

// ═══════════════════════════════════════════════
// EXPORTS
// ═══════════════════════════════════════════════
function exportCSV(){
  if(!lastResults.length)return;
  const hdr=['#','SECUENCIA',...COLS.map(c=>`${c.id} ${c.name}`)].join(',');
  const body=lastResults.map(r=>[r.idx,`"${r.raw}"`,...COLS.map(c=>r.vals[c.id])].join(','));
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([[hdr,...body].join('\n')],{type:'text/csv'})),download:'ASSY-INV_resultado.csv'});
  a.click();
}

function exportXLSX(){
  if(!lastResults.length)return;
  const hdr=['#','SECUENCIA',...COLS.map(c=>`${c.id} ${c.name}`)];
  const data=lastResults.map(r=>[r.idx,r.raw,...COLS.map(c=>r.vals[c.id])]);
  const ws=XLSX.utils.aoa_to_sheet([hdr,...data]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Resultados');
  XLSX.writeFile(wb,'ASSY-INV_resultado.xlsx');
}

// ═══════════════════════════════════════════════
// MODAL / CONFIRM
// ═══════════════════════════════════════════════
function showModal(title,body,onConfirm){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalConfirmBtn').onclick=()=>{onConfirm();closeModal();};
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
function confirmClear(){
  showModal('Limpiar inventario','¿Limpiar todos los campos del inventario actual?',()=>{
    getAllCells().forEach(c=>{
      const w=document.getElementById('inv_'+c.k+'_weld');
      const p=document.getElementById('inv_'+c.k+'_pint');
      if(w)w.value=0;if(p)p.value=0;
    });
  });
}
function confirmDeleteSnap(date){
  showModal('Eliminar registro',`¿Eliminar el registro del <strong>${date}</strong>?`,()=>deleteSnapshot(date));
}

function toggleHist(){
  const p=document.getElementById('histPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open'))loadHistory();
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._to);
  t._to=setTimeout(()=>{t.style.opacity='0';},2800);
}
</script>
